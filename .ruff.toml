target-version = "py310"

line-length = 90
indent-width = 4

include = [
    "py-src/**.py",
    "py-src/**.pyi",
    "tests/**.py",
    "benchmark/run.py",
    "pyproject.toml",
    "README.md",
    "setup.py",
]

[lint.isort]
force-wrap-aliases = true
combine-as-imports = true
no-lines-before = ["local-folder"]

[lint]
preview = true

select = ["ALL"]
ignore = [
    "ARG",    # Unused method argument
    ########
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D203",
    "D212",
    ########
    "CPY001", # Check copyright notices within Python files
    "S311",   # Forces `random` -> `secrets`
    "ANN401", # Check `typing.Any`
    "SIM105", # Forces `try-except-pass` -> `contextlib.suppress`
    ########
    "TC001",  # \
    "TC002",  #  ==> `typing.TYPE_CHECKING` block's
    "TC003",  # /
    "TC006",  # Add quotes to type expression in `typing.cast()`
]

[lint.per-file-ignores]
"py-src/c_uuid_v7/__init__.py" = ["RUF067"]
"py-src/c_uuid_v7/compat/__init__.py" = ["RUF067"]
"py-src/c_uuid_v7/_core.pyi" = ["PYI021"]
# tests
"tests/**.py" = [
    "S101",    # Check `assert`'s
    "PLR2004", # Check magic value's
    "FURB171", # Check for membership tests against single-item containers
]
# benchmark
"benchmark/**.py" = [
    "INP001",
]
"setup.py" = [
    "C901",
    "PLR0912",
    "PLR0915",
    "B009",
]

[lint.flake8-tidy-imports.banned-api]
"contextlib.suppress" = { msg = "Use `try-except-pass` instead" }
