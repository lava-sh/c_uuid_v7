[build-system]
requires = [
    "setuptools == 82.0.1",
    "setuptools-scm == 10.0.5",
]
build-backend = "setuptools.build_meta"

[project]
name = "c_uuid_v7"
dynamic = ["version"]
requires-python = ">=3.10"
description = "Fast UUID v7 generator implemented as a CPython C extension"
readme = "README.md"
license = "Unlicense"
license-files = ["UNLICENSE"]
authors = [
    { name = "chirizxc", email = "chirizxc@proton.me" }
]
classifiers = [
    "Typing :: Typed",
    "Programming Language :: C",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: PyPy",
    "Programming Language :: Python :: Implementation :: CPython",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[dependency-groups]
typos = ["typos == 1.44.0"]
zizmor = ["zizmor == 1.23.1"]
rumdl = ["rumdl == 0.1.63"]
pytest = ["pytest == 9.0.2"]
ci = [
    "ty == 0.0.26",
    "ruff == 0.15.8",
    { include-group = "pytest" },
]
dev = [
    { include-group = "ci" },
    { include-group = "typos" },
    { include-group = "rumdl" },
    { include-group = "zizmor" },
]
bench = [
    "uuid_utils == 0.14.1",
    "uuid_v7 == 1.0.0",
    "UUIDv7gen == 1.0.3",
    "uuid6 == 2025.0.1",
    "lastuuid == 0.5.0",
    "fastuuid == 0.14.0",
    # # # # # # # # # #
    "polars == 1.39.3",
    "altair == 6.0.0",
    "py-cpuinfo == 9.0.0",
    "vl-convert-python == 1.9.0.post1",
]

[tool.setuptools]
package-dir = { "" = "py-src" }
ext-modules = [
    { name = "c_uuid_v7.__core", sources = [
        "src/core.c",
        "src/hexpairs.c",
        "src/posix.c",
        "src/random.c",
        "src/windows.c",
    ] },
]

[tool.setuptools.packages.find]
where = ["py-src"]

[tool.setuptools_scm]
version_file = "py-src/c_uuid_v7/_version.py"
version_file_template = """\
# This file auto generated by `setuptools-scm`!
# DO NOT EDIT MANUALLY !!!

version: str = "{version}"
__version__: str = version

commit_hash: str = "{scm_version.node}"
version_timestamp: str = "{scm_version.time}"

tag: str = "{scm_version.tag}"
branch: str = "{scm_version.branch}"
commit_date: str = "{scm_version.node_date}"
commit_count_since_tag: int = {scm_version.distance}
"""

[tool.cibuildwheel]
build = "cp310-* cp311-* cp312-* cp313-* cp314-* pp311-*"
build-frontend = "build[uv]"
enable = ["pypy"]
skip = "*t-* *-musllinux_{ppc64le,s390x}"
test-command = "pytest {project}/tests"
test-groups = ["pytest"]
test-sources = ["tests"]

[tool.cibuildwheel.linux]
archs = ["x86_64", "i686", "aarch64", "ppc64le", "s390x", "armv7l"]
test-skip = "*-manylinux_{aarch64,ppc64le,s390x,armv7l} *-musllinux_{i686,aarch64,armv7l}"

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]
test-skip = "*-macosx_arm64"

[tool.cibuildwheel.windows]
archs = ["AMD64", "x86", "ARM64"]
test-skip = "*-win_arm64"

[[tool.cibuildwheel.overrides]]
select = "*-musllinux_{ppc64le,s390x}"
build-frontend = "build"

[[tool.cibuildwheel.overrides]]
select = "cp3{13,14}-*"
test-environment = { PYTHONMALLOC = "mimalloc" }
