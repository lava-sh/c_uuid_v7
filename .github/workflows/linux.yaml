name: "linux"

on:
  workflow_call:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - {
            target: "x86_64",
            manylinux: "manylinux_2_28",
          }
          - {
            target: "i686",
            manylinux: "manylinux_2_28",
          }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.platform.target }}
          CIBW_MANYLINUX_X86_64_IMAGE: ${{ matrix.platform.manylinux }}
          CIBW_MANYLINUX_I686_IMAGE: ${{ matrix.platform.manylinux }}

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: wheelhouse/*.whl

  run-cross:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    strategy:
      matrix:
        platform:
          - {
            target: aarch64,
          }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.platform.target }}

      - name: "Upload wheels"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: wheelhouse/*.whl
