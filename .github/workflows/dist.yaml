name: "Distributions"

on:
  push:
    branches:
      - "main"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  UV_PYTHON_DOWNLOADS: 0

jobs:
  wheels-linux-x64:
    name: "ubuntu-latest / wheels x64"
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv
        env:
          CIBW_ARCHS_LINUX: "x86_64 i686"

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-ubuntu-latest-x64
          path: wheelhouse/*.whl

  wheels-linux-emulated:
    name: "ubuntu-latest / wheels emulated"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: all

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv
        env:
          CIBW_ARCHS_LINUX: "armv7l ppc64le s390x riscv64"

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-ubuntu-latest-emulated
          path: wheelhouse/*.whl

  wheels-linux-arm:
    name: "ubuntu-24.04-arm / wheels aarch64"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv
        env:
          CIBW_ARCHS_LINUX: "aarch64"

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-ubuntu-24.04-arm
          path: wheelhouse/*.whl

  wheels-windows:
    name: "windows-latest / wheels"
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-windows-latest
          path: wheelhouse/*.whl

  wheels-macos:
    name: "macos-latest / wheels"
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - uses: pypa/cibuildwheel@8d2b08b68458a16aeb24b64e68a09ab1c8e82084 # v3.4.1
        with:
          extras: uv

      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-macos-latest
          path: wheelhouse/*.whl

  sdist:
    name: "sdist"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      # zizmor: ignore[cache-poisoning]
      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            .hpy-source
            .hpy-download
          key: hpy-source-0.9.0
          restore-keys: hpy-source-
          lookup-only: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: "Install uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: "Prepare HPy source"
        run: python scripts/prepare_hpy_source.py

      - name: "Build sdist"
        env:
          PYTHONMALLOC: "mimalloc"
        run: uv build --sdist

      - name: "Upload sdist"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sdist
          path: dist/*.tar.gz
