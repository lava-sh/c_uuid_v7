name: "Publish"

permissions:
  contents: read

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  tests:
    name: "${{ matrix.os }} / python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest,
        ]
        python-version: [
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
          "pypy3.11"
        ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
      - name: "Create and activate .venv"
        shell: bash
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo ".venv/Scripts" >> "$GITHUB_PATH"
          else
            echo ".venv/bin" >> "$GITHUB_PATH"
          fi
      - name: "Install build dependencies"
        run: uv pip install . --group ci
      - name: "Run ruff"
        run: ruff check
      - name: "Run pytest"
        run: pytest

  wheels:
    name: "${{ matrix.os }} / wheels"
    runs-on: ${{ matrix.os }}
    needs: tests
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest,
        ]
    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* pp311-*"
      CIBW_ENABLE: "pypy"
      CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux*"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      CIBW_TEST_REQUIRES: "pytest==9.0.2"
      CIBW_TEST_COMMAND: "pytest tests/ -q"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pypa/cibuildwheel@faf86a6ed7efa889faf6996aa23820831055001a # v2.23.3
      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: "sdist"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
      - name: "Build sdist"
        run: uv build --sdist
      - name: "Upload sdist"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: "Publish"
    runs-on: ubuntu-latest
    needs: [
      wheels,
      sdist,
    ]
    permissions:
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/p/c-uuid-v7
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"
      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: false
      - name: "Publish to PyPI"
        run: uv publish "wheels-*/*" "sdist/*" --trusted-publishing always
