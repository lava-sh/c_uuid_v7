name: "CI"

permissions: { }

on:
  push:
    branches:
      - main
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/tests.yaml

  zizmor:
    name: "zizmor"
    uses: ./.github/workflows/zizmor.yaml

  typos:
    name: "typos"
    uses: ./.github/workflows/typos.yaml

  rumdl:
    name: "rumdl"
    uses: ./.github/workflows/rumdl.yaml

  linux:
    needs: [ tests, zizmor, typos, rumdl ]
    uses: ./.github/workflows/linux.yaml

  windows:
    needs: [ tests, zizmor, typos, rumdl ]
    uses: ./.github/workflows/windows.yaml

  macos:
    needs: [ tests, zizmor, typos, rumdl ]
    uses: ./.github/workflows/macos.yaml

  sdist:
    needs: [ tests, zizmor, typos, rumdl ]
    uses: ./.github/workflows/sdist.yaml

  release:
    name: "Release"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [ linux, windows, macos, sdist ]
    permissions:
      id-token: write
      contents: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"

      - name: "Install uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: "Publish to PyPI"
        run: uv publish 'wheels-*/*' 'sdist/*'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }} # zizmor: ignore[secrets-outside-env]
