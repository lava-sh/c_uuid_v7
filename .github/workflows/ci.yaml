name: "CI"

permissions:
  contents: read

on:
  push:
    branches:
      - "main"
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  UV_PYTHON_DOWNLOADS: 0

jobs:
  tests:
    name: "${{ matrix.os }} / python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest,
        ]
        python-version: [
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "3.14",
          # "pypy3.11"
        ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Install uv"
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]

      - name: "Create and activate .venv"
        shell: bash
        run: |
          uv venv .venv --python ${{ matrix.python-version }}

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            echo ".venv/Scripts" >> "$GITHUB_PATH"
          else
            echo ".venv/bin" >> "$GITHUB_PATH"
          fi

      - name: "Install build dependencies"
        run: uv pip install . --group ci

      - name: "Run ruff"
        run: ruff check

      - name: "Run ty"
        run: ty check

      - name: "Run pytest (mimalloc)"
        if: matrix.python-version == '3.13' || matrix.python-version == '3.14'
        env:
          PYTHONMALLOC: mimalloc
        run: pytest

      - name: "Run pytest (default)"
        if: matrix.python-version != '3.13' && matrix.python-version != '3.14'
        run: pytest
