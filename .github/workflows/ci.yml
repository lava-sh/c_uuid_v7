name: CI

permissions: {}

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tests:
    name: "${{ matrix.os }} / python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: "Install build dependencies"
        run: python -m pip install --upgrade pip setuptools==82.0.1 "setuptools-scm[simple]==9.2.2" build pytest==9.0.2
      - name: "Install package"
        run: python -m pip install -e .
      - name: "Run tests"
        shell: bash
        run: |
          if [[ "${{ matrix.python-version }}" == 3.13* || "${{ matrix.python-version }}" == 3.14* ]]; then
            export PYTHONMALLOC=mimalloc
          fi
          python -m pytest tests/ -q

  wheels:
    name: "${{ matrix.os }} / wheels"
    runs-on: ${{ matrix.os }}
    needs: tests
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
      CIBW_SKIP: "pp* *-win32 *-manylinux_i686 *-musllinux*"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      CIBW_TEST_COMMAND: "python -m pytest tests/ -q"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pypa/cibuildwheel@v2.23.3
      - name: "Upload wheels"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: "sdist"
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
      - name: "Install build dependencies"
        run: python -m pip install --upgrade pip setuptools==82.0.1 "setuptools-scm[simple]==9.2.2" build pytest==9.0.2
      - name: "Build sdist"
        run: python -m build --sdist
      - name: "Upload sdist"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: "Release"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [wheels, sdist]
    permissions:
      id-token: write
      contents: write
      attestations: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "wheels-*/*"
      - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        with:
          enable-cache: false
      - name: "Publish to PyPI"
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: uv publish "wheels-*/*" "sdist/*"
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
