name: "Publish"

permissions:
  actions: read
  contents: read

on:
  release:
    types: [created]
  workflow_dispatch:

env:
  UV_PYTHON_DOWNLOADS: 0

jobs:
  preflight:
    name: "Verify required workflows"
    runs-on: ubuntu-latest
    steps:
      - name: "Check workflow conclusions"
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;
            const required = ["CI", "typos", "zizmor", "rumdl"];
            const timeoutMs = 15 * 60 * 1000;
            const pollIntervalMs = 15 * 1000;

            if (!context.ref.startsWith("refs/tags/")) {
              core.setFailed(`Publish is only allowed from tag refs, got: ${context.ref}`);
              return;
            }

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const deadline = Date.now() + timeoutMs;
            let lastFailures = [];

            while (Date.now() < deadline) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: sha,
                per_page: 100,
              });

              const runsByName = new Map();
              for (const run of data.workflow_runs) {
                if (!runsByName.has(run.name)) {
                  runsByName.set(run.name, []);
                }
                runsByName.get(run.name).push(run);
              }

              const failures = [];
              for (const name of required) {
                const runs = runsByName.get(name) || [];
                if (runs.length === 0) {
                  failures.push(`${name}: no workflow run found for ${sha}`);
                  continue;
                }

                const successful = runs.some((run) => run.conclusion === "success");
                if (!successful) {
                  const conclusions = runs.map((run) => run.conclusion || run.status).join(", ");
                  failures.push(`${name}: ${conclusions}`);
                }
              }

              if (failures.length === 0) {
                core.info("All required workflows completed successfully.");
                return;
              }

              lastFailures = failures;
              core.info(`Waiting for required workflows:\n${failures.join("\n")}`);
              await sleep(pollIntervalMs);
            }

            core.setFailed(
              `Required workflows are not all successful after waiting ${timeoutMs / 60000} minutes:\n${lastFailures.join("\n")}`,
            );

  build:
    name: "Build distributions"
    needs: preflight
    uses: ./.github/workflows/dist.yaml

  publish:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [
      build,
    ]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/c-uuid-v7
    steps:
      - name: "Download artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1

      - name: "Install uv"
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false

      - name: "Publish"
        run: uv publish "wheels-*/*" "sdist/*" --trusted-publishing always
